name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build and deploy prod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod

    steps:
      - name: Enforce production source branch
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Production deployments must run from main; selected ref is $GITHUB_REF." >&2
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Validate credential database
        run: node -e 'const users = require("./src/users"); users.loadUsers(); users.loadSolutionAuthHeader();'

      - name: Validate deployment configuration
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_PATH: ${{ vars.VPS_APP_PATH }}
          VPS_INFRA_PATH: ${{ vars.VPS_INFRA_PATH }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL: ${{ vars.REPORT_EMAIL }}
          PORT: ${{ vars.PORT }}
          CRON_SCHEDULE: ${{ vars.CRON_SCHEDULE }}
          CRON_TIMEZONE: ${{ vars.CRON_TIMEZONE }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          for name in VPS_HOST VPS_USER VPS_APP_PATH VPS_INFRA_PATH VPS_SSH_PRIVATE_KEY VPS_KNOWN_HOSTS SMTP_USER SMTP_PASSWORD REPORT_EMAIL; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub prod environment configuration: $name" >&2
              exit 1
            fi
          done
          [[ "${VPS_PORT:-22}" =~ ^[0-9]+$ ]] || { echo "VPS_PORT must be numeric." >&2; exit 1; }
          [[ "$VPS_USER" =~ ^[a-z_][a-z0-9_-]*$ ]] || { echo "VPS_USER contains unsupported characters." >&2; exit 1; }
          [[ "$VPS_APP_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]] || { echo "VPS_APP_PATH must be an absolute path without spaces." >&2; exit 1; }
          [[ "$VPS_INFRA_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]] || { echo "VPS_INFRA_PATH must be an absolute path without spaces." >&2; exit 1; }

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and publish immutable image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

      - name: Configure SSH
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy exact image to VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          VPS_APP_PATH: ${{ vars.VPS_APP_PATH }}
          VPS_INFRA_PATH: ${{ vars.VPS_INFRA_PATH }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL: ${{ vars.REPORT_EMAIL }}
          PORT: ${{ vars.PORT }}
          CRON_SCHEDULE: ${{ vars.CRON_SCHEDULE }}
          CRON_TIMEZONE: ${{ vars.CRON_TIMEZONE }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          port="${VPS_PORT:-22}"
          image="${REGISTRY}/${IMAGE_NAME}@${IMAGE_DIGEST}"
          release_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -p "$port" "${VPS_USER}@${VPS_HOST}" \
            bash -s -- "$VPS_APP_PATH" "$release_id" <<'REMOTE'
          set -euo pipefail
          app_path="$1"
          release_id="$2"
          release_dir="$app_path/.github-deployments/$release_id"

          mkdir -p "$release_dir"
          REMOTE

          scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -P "$port" \
            docker-compose.base.yml \
            docker-compose.prod.yml \
            config/users.json \
            config/solution-user.json \
            "${VPS_USER}@${VPS_HOST}:${VPS_APP_PATH}/.github-deployments/${release_id}/"

          {
            printf 'export SMTP_USER=%q\n' "$SMTP_USER"
            printf 'export SMTP_PASSWORD=%q\n' "$SMTP_PASSWORD"
            printf 'export REPORT_EMAIL=%q\n' "$REPORT_EMAIL"
            printf 'export PORT=%q\n' "$PORT"
            printf 'export CRON_SCHEDULE=%q\n' "$CRON_SCHEDULE"
            printf 'export CRON_TIMEZONE=%q\n' "$CRON_TIMEZONE"
            printf 'export SMTP_HOST=%q\n' "$SMTP_HOST"
            printf 'export SMTP_PORT=%q\n' "$SMTP_PORT"
            cat <<'REMOTE'
          set -euo pipefail
          app_path="$1"
          infra_path="$2"
          release_id="$3"
          image="$4"
          deploy_script="$infra_path/scripts/deploy-app.sh"
          release_dir="$app_path/.github-deployments/$release_id"

          if [[ ! -x "$deploy_script" ]]; then
            echo "Central deploy script is missing or not executable: $deploy_script" >&2
            exit 1
          fi

          install -d -m 700 "$app_path/config"
          install -m 600 "$release_dir/users.json" "$app_path/config/users.json"
          install -m 600 "$release_dir/solution-user.json" "$app_path/config/solution-user.json"

          export CONFIG_DIR="$app_path/config"
          CI_DEPLOY_APPROVED=true "$deploy_script" \
            --workdir "$release_dir" \
            gfg-potd-bot prod rollout-image "$image"
          REMOTE
          } | ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -p "$port" "${VPS_USER}@${VPS_HOST}" \
            bash -s -- "$VPS_APP_PATH" "$VPS_INFRA_PATH" "$release_id" "$image"

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## Deployment"
            echo "- Environment: \`prod\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image digest: \`${{ steps.image.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
