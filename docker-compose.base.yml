services:
  bot:
    image: ${APP_IMAGE:-gfg-potd-bot:latest}
    build:
      context: .
    environment:
      PORT: ${PORT:-}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-}
      CRON_TIMEZONE: ${CRON_TIMEZONE:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
      REPORT_EMAIL: ${REPORT_EMAIL:?REPORT_EMAIL is required}
      USERS_FILE: /config/users.json
      SOLUTION_USER_FILE: /config/solution-user.json
    volumes:
      - type: bind
        source: ${CONFIG_DIR:?CONFIG_DIR is required}/users.json
        target: /config/users.json
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${CONFIG_DIR:?CONFIG_DIR is required}/solution-user.json
        target: /config/solution-user.json
        read_only: true
        bind:
          create_host_path: false
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:$${PORT:-1289}/healthz",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
